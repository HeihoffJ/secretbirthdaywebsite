<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sinas Geburtstag – Das Abenteuer beginnt!</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Comic Sans MS', cursive;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #videoWrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #introVideo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    #skipBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 2px solid #ff00ff;
      font-family: 'Comic Sans MS', cursive;
      font-size: 1rem;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #skipBtn:hover { background: rgba(136,0,255,0.7); }
    #noVideoMsg {
      display: none;
      text-align: center;
      padding: 40px;
    }
    #noVideoMsg h2 {
      font-size: 2rem;
      color: #ff00ff;
      margin-bottom: 20px;
      animation: flash 1s linear infinite alternate;
    }
    #noVideoMsg p { color: #aaa; margin-bottom: 30px; font-size: 1rem; }
    #goBtn {
      background: linear-gradient(135deg, #ff00ff, #8800ff);
      color: #fff;
      border: 3px solid #ffff00;
      font-family: 'Comic Sans MS', cursive;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 12px 32px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    @keyframes flash {
      from { color: #ff00ff; }
      to   { color: #ffff00; }
    }
  </style>
</head>
<body>
  <div id="videoWrap">
    <!-- Ersetze 'intro.mp4' mit deinem tatsächlichen Video-Dateinamen -->
    <video id="introVideo" autoplay playsinline>
      <source src="../video/intro.mp4" type="video/mp4">
    </video>
  </div>

  <button id="skipBtn">Überspringen →</button>

  <div id="noVideoMsg">
    <h2>🎂 Happy Birthday Sina! 🎂</h2>
    <p>Das Abenteuer beginnt jetzt...</p>
    <button id="goBtn" onclick="go()">Los geht's! 🧩</button>
  </div>

  <script>
    function go() { window.location.href = '01.html?u=1'; }

    const video = document.getElementById('introVideo');
    const wrap  = document.getElementById('videoWrap');
    const noVid = document.getElementById('noVideoMsg');
    const skip  = document.getElementById('skipBtn');

    video.addEventListener('ended', go);
    skip.addEventListener('click', go);

    video.addEventListener('error', () => {
      wrap.style.display = 'none';
      skip.style.display = 'none';
      noVid.style.display = 'block';
    });

    // If video fails to load at all
    setTimeout(() => {
      if (video.readyState === 0 && video.error === null) {
        wrap.style.display = 'none';
        skip.style.display = 'none';
        noVid.style.display = 'block';
      }
    }, 3000);
  </script>
</body>
</html>
